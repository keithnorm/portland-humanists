# Netlify configuration for Astro + TinaCMS
# Required env vars (set in Netlify dashboard → Site settings → Environment variables):
#   TINA_PUBLIC_CLIENT_ID  — from app.tina.io project settings
#   TINA_TOKEN             — from app.tina.io project settings (keep secret)

[build]
  command = "npm run build"
  publish = "dist"


# TinaCMS admin security headers
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
